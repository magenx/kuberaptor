name: Build Go App for Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Tag to build"
        required: true
        type: string
      sha:
        description: "Commit SHA to checkout"
        required: true
        type: string
      prerelease:
        description: "Release type - prerelease or release"
        required: true
        type: boolean
    secrets:
      KUBERAPTOR_TOKEN:
        required: true

env:
  PRELELEASE_TYPE: ${{ vars.PRERELEASE_TYPE }}
  GO_VERSION: ${{ vars.GO_VERSION }}

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build-release:
    name: Build Go Binary - ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: darwin
            arch: arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - name: Checkout code at release sha
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run all tests
        id: test
        env:
          CGO_ENABLED: 1
        run: |
          # Run all test
          go test -v -race -coverprofile=coverage.out ./...
      
      - name: Build go binary
        id: build
        env:
          CGO_ENABLED: 0
        run: |
          # Fetch the version from the GitHub release tag
          VERSION="${{ inputs.tag_name }}"
          
          # Dynamically set the binary name based on OS and architecture
          BINARY_NAME_ARCH="${GITHUB_REPOSITORY##*/}-${{ matrix.os }}-${{ matrix.arch }}"
          echo "binary_name_arch=${GITHUB_REPOSITORY##*/}-${{ matrix.os }}-${{ matrix.arch }}" >> ${GITHUB_OUTPUT}
          echo "binary_name=${GITHUB_REPOSITORY##*/}" >> ${GITHUB_OUTPUT}
          
          echo "Building ${BINARY_NAME_ARCH} with version ${VERSION}"
          
          # Build the Go binary with version information embedded via -ldflags
          go build -ldflags "-X github.com/magenx/${GITHUB_REPOSITORY##*/}/pkg/version.Version=${VERSION} -s -w" -o "${BINARY_NAME_ARCH}" ./cmd/${GITHUB_REPOSITORY##*/}
          
          # Check if the binary was successfully built
          if [ ! -f "${BINARY_NAME_ARCH}" ]; then
            echo "Error: Build failed. Binary not found!"
            exit 1
          fi

          # Generate and tore checksum for the final job to pick up
          sha256sum "${BINARY_NAME_ARCH}" > "${BINARY_NAME_ARCH}.sha256"

      - name: Upload build artifacts
        id: upload
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ${{ steps.build.outputs.binary_name_arch }}
            ${{ steps.build.outputs.binary_name_arch }}.sha256
          if-no-files-found: error
          retention-days: 1

  upload-release:
    name: Publish release assets and append body
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifact

      - name: Append release body and upload all assets
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          token: ${{ secrets.KUBERAPTOR_TOKEN }}
          tag_name: ${{ inputs.tag_name }}
          files: artifact/**
          draft: true
          prerelease: ${{ inputs.prerelease }}
          overwrite_files: true
          append_body: true
          body: |
            <details>
            <summary>Installation for <strong>linux (amd64)</strong></summary>
            <pre><code>
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-linux-amd64
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-linux-amd64.sha256
            sha256sum -c ${{ github.event.repository.name }}-linux-amd64.sha256 && echo "✅ Verification passed" || (echo "❌ Verification failed" && exit 1)
            chmod +x ${{ github.event.repository.name }}-linux-amd64
            mv ${{ github.event.repository.name }}-linux-amd64 /usr/local/bin/${{ github.event.repository.name }}
            ${{ github.event.repository.name }} version
            </code></pre>
            </details>

            <details>
            <summary>Installation for <strong>linux (arm64)</strong></summary>
            <pre><code>
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-linux-arm64
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-linux-arm64.sha256
            sha256sum -c ${{ github.event.repository.name }}-linux-arm64.sha256 && echo "✅ Verification passed" || (echo "❌ Verification failed" && exit 1)
            chmod +x ${{ github.event.repository.name }}-linux-arm64
            mv ${{ github.event.repository.name }}-linux-arm64 /usr/local/bin/${{ github.event.repository.name }}
            ${{ github.event.repository.name }} version
            </code></pre>
            </details>

            <details>
            <summary>Installation for <strong>darwin (arm64)</strong></summary>
            <pre><code>
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-darwin-arm64
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-darwin-arm64.sha256
            shasum -a 256 -c ${{ github.event.repository.name }}-darwin-arm64.sha256 && echo "✅ Verification passed" || (echo "❌ Verification failed" && exit 1)
            chmod +x ${{ github.event.repository.name }}-darwin-arm64
            mv ${{ github.event.repository.name }}-darwin-arm64 /usr/local/bin/${{ github.event.repository.name }}
            ${{ github.event.repository.name }} version
            </code></pre>
            </details>
