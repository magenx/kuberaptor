name: Build Go App for Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Tag to build"
        required: true
        type: string
      sha:
        description: "Commit SHA to checkout"
        required: true
        type: string
      prerelease:
        description: "Release type - prerelease or release"
        required: true
        type: boolean
    secrets:
      KUBERAPTOR_TOKEN:
        required: true

env:
  PRELELEASE_TYPE: ${{ vars.PRERELEASE_TYPE }}
  GO_VERSION: ${{ vars.GO_VERSION }}

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build-release:
    name: Build Go Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code at release sha
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run all tests
        id: test
        shell: bash
        env:
          CGO_ENABLED: 1
        run: |
          # Run all test
          go test -v -race -coverprofile=${RUNNER_TEMP}/coverage.out ./...
      
      - name: Build release binaries
        id: build
        shell: bash
        env:
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          
          VERSION="${{ inputs.tag_name }}"
          
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin arm64"
            "windows amd64 .exe"
          )
          
          for t in "${targets[@]}"; do
            read -r GOOS GOARCH EXT <<<"$t"
            EXT="${EXT:-}"
          
            BINARY_NAME_ARCH="${{ github.event.repository.name }}-${GOOS}-${GOARCH}${EXT}"
          
            echo "==> Building ${BINARY_NAME_ARCH} (GOOS=${GOOS} GOARCH=${GOARCH}) version=${VERSION}"
            GOOS="${GOOS}" GOARCH="${GOARCH}" \
              go build -ldflags "-X github.com/magenx/${{ github.event.repository.name }}/pkg/version.Version=${VERSION} -s -w" \
              -o "${BINARY_NAME_ARCH}" "./cmd/${{ github.event.repository.name }}"
          
            test -f "${BINARY_NAME_ARCH}"
            sha256sum "${BINARY_NAME_ARCH}" > "${BINARY_NAME_ARCH}.sha256"
          done

      - name: Upload build artifacts
        id: upload
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-${{ inputs.tag_name }}-artifacts
          path: |
            ${{ github.event.repository.name }}-*
            ${{ github.event.repository.name }}-*.sha256
          if-no-files-found: error
          retention-days: 1

  upload-release:
    name: Publish release assets and append body
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifact

      - name: Append release body and upload all assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        #uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          token: ${{ secrets.KUBERAPTOR_TOKEN }}
          tag_name: ${{ inputs.tag_name }}
          files: artifact/**
          draft: true
          prerelease: ${{ inputs.prerelease }}
          overwrite_files: true
          append_body: true
          body: |
            <details>
            <summary>Installation for <strong>linux (amd64)</strong></summary>
            <pre><code>
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-linux-amd64
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-linux-amd64.sha256
            sha256sum -c ${{ github.event.repository.name }}-linux-amd64.sha256 && echo "✅ Verification passed" || (echo "❌ Verification failed" && exit 1)
            chmod +x ${{ github.event.repository.name }}-linux-amd64
            mv ${{ github.event.repository.name }}-linux-amd64 /usr/local/bin/${{ github.event.repository.name }}
            ${{ github.event.repository.name }} version
            </code></pre>
            </details>
            <details>
            <summary>Installation for <strong>linux (arm64)</strong></summary>
            <pre><code>
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-linux-arm64
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-linux-arm64.sha256
            sha256sum -c ${{ github.event.repository.name }}-linux-arm64.sha256 && echo "✅ Verification passed" || (echo "❌ Verification failed" && exit 1)
            chmod +x ${{ github.event.repository.name }}-linux-arm64
            mv ${{ github.event.repository.name }}-linux-arm64 /usr/local/bin/${{ github.event.repository.name }}
            ${{ github.event.repository.name }} version
            </code></pre>
            </details>
            <details>
            <summary>Installation for <strong>darwin (arm64)</strong></summary>
            <pre><code>
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-darwin-arm64
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-darwin-arm64.sha256
            shasum -a 256 -c ${{ github.event.repository.name }}-darwin-arm64.sha256 && echo "✅ Verification passed" || (echo "❌ Verification failed" && exit 1)
            chmod +x ${{ github.event.repository.name }}-darwin-arm64
            mv ${{ github.event.repository.name }}-darwin-arm64 /usr/local/bin/${{ github.event.repository.name }}
            ${{ github.event.repository.name }} version
            </code></pre>
            </details>
            <details>
            <summary>Installation for <strong>windows (amd64)</strong></summary>
            <pre><code>
            # PowerShell (Windows 10/11)
            $ErrorActionPreference = "Stop"
            $repo = "${{ github.repository }}"
            $tag  = "${{ inputs.tag_name }}"
            $name = "${{ github.event.repository.name }}"
            $bin = "$name-windows-amd64.exe"
            $sum = "$bin.sha256"
            $urlBin = "https://github.com/$repo/releases/download/$tag/$bin"
            $urlSum = "https://github.com/$repo/releases/download/$tag/$sum"
            # Download
            Invoke-WebRequest -Uri $urlBin -OutFile $bin
            Invoke-WebRequest -Uri $urlSum -OutFile $sum
            # Verify SHA256 (expected from .sha256 file vs actual hash)
            $expected = (Get-Content $sum -Raw).Split(" ", [System.StringSplitOptions]::RemoveEmptyEntries)[0].Trim().ToLower()
            $actual   = (Get-FileHash -Algorithm SHA256 $bin).Hash.ToLower()
            if ($expected -ne $actual) {
              Write-Error "❌ Verification failed: expected $expected got $actual"
              exit 1
            } else {
              Write-Host "✅ Verification passed"
            }
            # Install (no admin): copy to a per-user folder
            $installDir = Join-Path $env:LOCALAPPDATA "Programs\$name"
            New-Item -ItemType Directory -Force -Path $installDir | Out-Null
            Copy-Item -Force $bin (Join-Path $installDir "$name.exe")
            # Run
            & (Join-Path $installDir "$name.exe") version
            </code></pre>
            </details>
