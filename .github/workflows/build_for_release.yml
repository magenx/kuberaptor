name: Build Go App for Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Tag to build"
        required: true
        type: string
      sha:
        description: "Commit SHA to checkout"
        required: true
        type: string
      prerelease:
        description: "Release type - prerelease or release"
        required: true
        type: boolean
    secrets:
      KUBERAPTOR_TOKEN:
        required: true

env:
  PRELELEASE_TYPE: ${{ vars.PRERELEASE_TYPE }}
  GO_VERSION: ${{ vars.GO_VERSION }}

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build-release:
    name: Build Go Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code at release sha
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run all tests
        id: test
        shell: bash
        env:
          CGO_ENABLED: 1
        run: |
          # Run all test
          go test -v -race -coverprofile=${RUNNER_TEMP}/coverage.out ./...
      
      - name: Build release binaries
        id: build
        shell: bash
        env:
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          
          VERSION="${{ inputs.tag_name }}"
          
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin arm64"
            "windows amd64 .exe"
          )
          
          for t in "${targets[@]}"; do
            read -r GOOS GOARCH EXT <<<"$t"
            EXT="${EXT:-}"
          
            BINARY_NAME_ARCH="${{ github.event.repository.name }}-${GOOS}-${GOARCH}${EXT}"
          
            echo "==> Building ${BINARY_NAME_ARCH} (GOOS=${GOOS} GOARCH=${GOARCH}) version=${VERSION}"
            GOOS="${GOOS}" GOARCH="${GOARCH}" \
              go build -ldflags "-X github.com/magenx/${{ github.event.repository.name }}/pkg/version.Version=${VERSION} -s -w" \
              -o "${BINARY_NAME_ARCH}" "./cmd/${{ github.event.repository.name }}"
          
            if [ ! -f "${BINARY_NAME_ARCH}" ]; then
              echo "Error: Build failed. Binary not found!"
              exit 1
            fi
            echo "${GOOS}_${GOARCH}_checksum=$(sha256sum ${BINARY_NAME_ARCH})" >> ${GITHUB_OUTPUT}
          done

      - name: Append release body and upload all assets
        env:
          GH_TOKEN: ${{ secrets.KUBERAPTOR_TOKEN }}
        run: |
          # Get current release body
          CURRENT_BODY=$(gh release view "${{ inputs.tag_name }}" --repo "${{ github.repository }}" --json body -q .body)
          
          # New content to append
          NEW_BODY='<details>
          <summary>Installation for <strong>Linux (amd64)</strong></summary>
          <pre><code>
          curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-linux-amd64
          if echo "${{ steps.build.outputs.linux_amd64_checksum }}" | sha256sum -c; then
            echo "Verification passed"
            chmod +x ${{ github.event.repository.name }}-linux-amd64
            mv ${{ github.event.repository.name }}-linux-amd64 /usr/local/bin/${{ github.event.repository.name }}
            ${{ github.event.repository.name }} version
          else
            echo "Verification failed"
          fi
          </code></pre>
          </details>
          <details>
          <summary>Installation for <strong>Linux (arm64)</strong></summary>
          <pre><code>
          curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-linux-arm64
          if echo "${{ steps.build.outputs.linux_arm64_checksum }}" | sha256sum -c; then
            echo "Verification passed"
            chmod +x ${{ github.event.repository.name }}-linux-arm64
            mv ${{ github.event.repository.name }}-linux-arm64 /usr/local/bin/${{ github.event.repository.name }}
            ${{ github.event.repository.name }} version
          else
            echo "Verification failed"
          fi
          </code></pre>
          </details>
          <details>
          <summary>Installation for <strong>MacOS (arm64)</strong></summary>
          <pre><code>
          curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}/${{ github.event.repository.name }}-darwin-arm64
          if echo "${{ steps.build.outputs.darwin_arm64_checksum }}" | sha256sum -c; then
            echo "Verification passed"
            chmod +x ${{ github.event.repository.name }}-darwin-arm64
            mv ${{ github.event.repository.name }}-darwin-arm64 /usr/local/bin/${{ github.event.repository.name }}
            ${{ github.event.repository.name }} version
          else
            echo "Verification failed"
          fi
          </code></pre>
          </details>
          <details>
          <summary>Installation for <strong>Windows (amd64)</strong></summary>
          <pre><code>
          # PowerShell (Windows 10/11)
          $ErrorActionPreference = "Stop"
          $repo = "${{ github.repository }}"
          $tag  = "${{ inputs.tag_name }}"
          $name = "${{ github.event.repository.name }}"
          $bin = "$name-windows-amd64.exe"
          $sum = "${{ steps.build.outputs.windows_amd64_checksum }}"
          $urlBin = "https://github.com/$repo/releases/download/$tag/$bin"
          # Download
          Invoke-WebRequest -Uri $urlBin -OutFile $bin
          # Verify SHA256 (expected vs actual hash)
          $expected = $sum.Trim().ToLower()
          $actual   = (Get-FileHash -Algorithm SHA256 $bin).Hash.ToLower()
          if ($expected -ne $actual) {
            Write-Error "Verification failed: expected $expected got $actual"
            exit 1
          } else {
            Write-Host "Verification passed"
          }
          # Install (no admin): copy to a per-user folder
          $installDir = Join-Path $env:LOCALAPPDATA "Programs\$name"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Copy-Item -Force $bin (Join-Path $installDir "$name.exe")
          # Run
          & (Join-Path $installDir "$name.exe") version
          </code></pre>
          </details>'
          
          # Combine current body with new content
          FINAL_BODY="${CURRENT_BODY}\\n\\n${NEW_BODY}"
          
          # Update release with new body and settings
          gh release edit "${{ inputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --draft=true \
            --prerelease=${{ inputs.prerelease }} \
            --body="$FINAL_BODY"
          
          # Upload all assets
          gh release upload "${{ inputs.tag_name }}" ${{ github.event.repository.name }}-* \
            --repo "${{ github.repository }}" \
            --clobber
